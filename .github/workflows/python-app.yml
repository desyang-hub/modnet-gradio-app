# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Modnet gradio app

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        # 使用 commit sha 作为标签，方便追踪
        tags: modnet-gradio-app:${{ github.sha }}
        # 启用 GitHub Actions 缓存，加速后续构建
        cache-from: type=gha
        cache-to: type=gha,mode=max
        # 如果构建过程中任何一步失败（如 pip install 失败），此步骤会报错并停止 CI
        load: true

    - name: Verify Image Created
      run: |
        docker images | grep modnet-gradio-app
        echo "✅ Docker image built successfully!"
    
